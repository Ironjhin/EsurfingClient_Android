name: Build Magisk Module

on:
  push:
    branches:
      - magisk
    paths-ignore:
      - 'README.md'
      - 'magisk/README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build zip unzip

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: magisk/.ndk
          key: ndk-r27c

      - name: Build daemon binary
        run: |
          cd magisk
          bash build.sh

      - name: Build WebView APK (optional)
        continue-on-error: true
        run: |
          echo "=== Setting up Android SDK for APK build ==="
          export ANDROID_HOME=${ANDROID_SDK_ROOT:-$ANDROID_HOME}
          if [ -z "$ANDROID_HOME" ] || [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            echo "SDK platform 34 not found, trying to install..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          fi

          echo "=== Downloading Gradle ==="
          cd magisk
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip

          # 生成 local.properties 指向 Android SDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          echo "=== Building APK ==="
          ./gradle-8.4/bin/gradle :app:assembleDebug --no-daemon 2>&1 || {
            echo "APK build failed (non-fatal)"
            exit 0
          }
          ls -la app/build/outputs/apk/debug/ 2>/dev/null && echo "APK build SUCCESS" || echo "No APK output found"

      - name: Package module
        run: |
          MODULE_DIR="magisk/module"

          # 自动生成唯一版本号,避免 tag 冲突
          # 版本号格式: 1.1.{run_number},确保每次构建都递增
          AUTO_VERSION="1.1.${{ github.run_number }}"
          AUTO_VERSION_CODE="${{ github.run_number }}"

          # 覆写 module.prop 中的版本号
          sed -i "s/^version=.*/${AUTO_VERSION}/" "$MODULE_DIR/module.prop"
          sed -i "s/^versionCode=.*/${AUTO_VERSION_CODE}/" "$MODULE_DIR/module.prop"

          echo "AUTO_VERSION=$AUTO_VERSION"
          echo "AUTO_VERSION_CODE=$AUTO_VERSION_CODE"
          echo "Updated module.prop:"
          cat "$MODULE_DIR/module.prop"

          VERSION="$AUTO_VERSION"
          VERSION_CODE="$AUTO_VERSION_CODE"

          # 确保 portal 文件存在
          if [ ! -f "$MODULE_DIR/portal/index.html" ]; then
            echo "ERROR: portal files missing at $MODULE_DIR/portal/" >&2
            exit 1
          fi
          echo "Portal files OK"

          # Inject WebView APK if built
          mkdir -p "$MODULE_DIR/system/app/ESurfingUI"
          if [ -f magisk/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp magisk/app/build/outputs/apk/debug/app-debug.apk "$MODULE_DIR/system/app/ESurfingUI/"
            echo "WebView APK included"
          else
            echo "No WebView APK — module will use browser UI only"
          fi

          # Create final module zip
          mkdir -p magisk/output
          cd "$MODULE_DIR"
          zip -r9 "$GITHUB_WORKSPACE/magisk/output/esurfing-daemon-arm64-v8a.zip" . -x ".*" "*/.*"
          ls -la "$GITHUB_WORKSPACE/magisk/output/"

          # 输出版本信息供后续步骤使用
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Upload module dir
        uses: actions/upload-artifact@v4
        with:
          name: module-dir
          path: magisk/module/

  create-release:
    needs: build
    if: github.ref == 'refs/heads/magisk'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download module dir
        uses: actions/download-artifact@v4
        with:
          name: module-dir
          path: module-dir

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 module-dir/module.prop 读取版本号
          VERSION=$(grep "^version=" module-dir/module.prop | cut -d'=' -f2)
          TAG_NAME="magisk-$VERSION"
          ZIP_NAME="esurfing-daemon-arm64-v8a.zip"

          echo "Release version: $VERSION"
          echo "Tag name: $TAG_NAME"

          # 从 module 目录打包 zip（避免 upload-artifact 的双重 zip 问题）
          cd module-dir
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" . -x ".*" "*/.*"
          cd "$GITHUB_WORKSPACE"
          mkdir -p release
          mv "$ZIP_NAME" release/
          echo "Release zip: $(ls -lh release/)"

          printf '%s\n' \
            "## 🔌 ESurfing Daemon — Magisk / KernelSU 模块" \
            "纯 C 守护进程 ~1-2MB，开机自启。支持 Magisk 和 KernelSU 双平台。" \
            "" \
            "[👉 Flutter APK 版（无 Root 设备用）](https://github.com/Ironjhin/EsurfingClient_Android/releases?q=v1.0.)" \
            "" \
            "---" \
            "" \
            "### ✨ 本次更新 ($VERSION)" \
            "- **修复**: 账号带前导 0(如 0123456789)保存后 USR_LEN 过短导致 parse 失败 → 扩大到 64 字节" \
            "- **Flutter APK 同步修复**: USR_LEN 扩大 + 从 Settings 返回自动启动(无需再杀 APP 重开)" \
            "- **新增**: WebUI/Flutter 增加「强制重新认证」按钮，认证失败久等时无需等 300s/600s 回退计时" \
            "- **KernelSU WebUI**: 同步 Magisk portal 功能（运行时间、日志刷新/导出）" \
            "" \
            "### ⚠️ Flutter APK 用户注意" \
            "长时间熄屏(约 30 分钟以上)Android 会回收进程,需重新打开 APP 才能继续守护。Magisk 版无此限制。" \
            "" \
            "### 安装" \
            "1. 下载 zip 文件" \
            "2. Magisk Manager 或 KernelSU Manager → 模块 → 从本地安装" \
            "3. 重启" \
            "" \
            "### Web 管理" \
            "- **Magisk**: 桌面 ESurfing 应用图标 / 浏览器 http://127.0.0.1:8888/" \
            "- **KernelSU**: KernelSU Manager → 模块 → ESurfing Daemon → WebUI" \
            "> 浏览器访问需要 ADB 端口转发" \
            > /tmp/release-notes.md

          gh release create "$TAG_NAME" \
            release/*.zip \
            --title "🔌 ESurfing Daemon $TAG_NAME（Magisk/KernelSU）" \
            --notes-file /tmp/release-notes.md
