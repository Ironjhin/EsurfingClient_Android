name: Build Magisk Module

on:
  push:
    branches:
      - magisk
    paths-ignore:
      - 'README.md'
      - 'magisk/README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build zip unzip

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: magisk/.ndk
          key: ndk-r27c

      - name: Build daemon binary
        run: |
          cd magisk
          bash build.sh

      - name: Build WebView APK (optional)
        continue-on-error: true
        run: |
          echo "=== Setting up Android SDK for APK build ==="
          # Accept licenses and install required SDK components
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

          echo "=== Generating Gradle wrapper ==="
          cd magisk/app
          gradle wrapper --gradle-version=8.4 2>&1 || { echo "gradle wrapper failed, trying manual setup"; exit 1; }

          echo "=== Building APK ==="
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 || {
            echo "APK build failed (non-fatal)"
            exit 0
          }
          ls -la build/outputs/apk/debug/ 2>/dev/null && echo "APK build SUCCESS" || echo "No APK output found"

      - name: Package module
        run: |
          MODULE_DIR="magisk/module"
          VERSION="v1.0.${{ github.run_number }}"
          VERSION_CODE="${{ github.run_number }}"

          # 注入版本号到 module.prop
          sed -i "s/^version=.*/version=$VERSION/" "$MODULE_DIR/module.prop"
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" "$MODULE_DIR/module.prop"
          echo "Module version set to $VERSION (code $VERSION_CODE)"

          # 确保 portal 文件存在
          if [ ! -f "$MODULE_DIR/portal/index.html" ]; then
            echo "ERROR: portal files missing at $MODULE_DIR/portal/" >&2
            exit 1
          fi
          echo "Portal files OK"

          # Inject WebView APK if built
          mkdir -p "$MODULE_DIR/system/app/ESurfingUI"
          if [ -f magisk/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp magisk/app/build/outputs/apk/debug/app-debug.apk "$MODULE_DIR/system/app/ESurfingUI/"
            echo "WebView APK included"
          else
            echo "No WebView APK — module will use browser UI only"
          fi

          # Create final module zip
          mkdir -p magisk/output
          cd "$MODULE_DIR"
          zip -r9 "$GITHUB_WORKSPACE/magisk/output/esurfing-daemon-arm64-v8a.zip" . -x ".*" "*/.*"
          ls -la "$GITHUB_WORKSPACE/magisk/output/"

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: esurfing-daemon-arm64-v8a
          path: magisk/output/esurfing-daemon-arm64-v8a.zip

  create-release:
    needs: build
    if: github.ref == 'refs/heads/magisk'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download module
        uses: actions/download-artifact@v4
        with:
          name: esurfing-daemon-arm64-v8a

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="magisk-v1.0.${{ github.run_number }}"
          mkdir -p release
          mv esurfing-daemon-arm64-v8a.zip release/
          cat > /tmp/release-notes.md << 'NOTES'
          ESurfing Daemon — Magisk Module (构建 ${{ github.run_number }})

          ## 安装
          1. 下载 zip 文件
          2. Magisk Manager → 模块 → 从本地安装
          3. 重启

          ## 首次使用
          1. 编辑 /data/adb/esurfing/ESurfingClient.json 填入账号密码
          2. 重启 daemon: `killall esurfingd && /data/adb/esurfing/esurfingd`
          3. 或直接重启手机

          ## Web 管理
          - 桌面 ESurfing 应用图标（模块自带 WebView APK）
          - 或浏览器打开 http://127.0.0.1:8888/

          ## 日志
          - /data/adb/esurfing/run.log

          ## Flutter APK（无 Root 设备用）
          https://github.com/Ironjhin/EsurfingClient_Android/releases?q=v1.0.
          NOTES

          gh release create "$TAG_NAME" \
            release/*.zip \
            --title "ESurfing Daemon $TAG_NAME" \
            --notes-file /tmp/release-notes.md
