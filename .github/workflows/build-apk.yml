name: Flutter Multi-Arch APK Build

on:
  push:
    branches: [ "main" ] # 如果你的主分支叫 master，请改为 master
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 签出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Java 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 配置 Android SDK 环境
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4. 配置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 5. 进入子文件夹获取依赖
      - name: Install dependencies
        run: flutter pub get
        working-directory: esurfing_flutter # 👈 强行指定进入该文件夹执行

      # 6. 进入子文件夹执行分架构 Release APK 编译
      - name: Build Split Release APKs
        run: flutter build apk --release --split-per-abi
        working-directory: esurfing_flutter # 👈 强行指定进入该文件夹执行

      # 7. 收集并上传编译出的 arm64-v8a 安装包（注意路径前面加上了子文件夹名）
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: surfing-client-arm64
          path: esurfing_flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      # 8. 收集并上传 armeabi-v7a 安装包
      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: surfing-client-armv7
          path: esurfing_flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
