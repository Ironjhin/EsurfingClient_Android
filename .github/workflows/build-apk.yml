name: Flutter Multi-Arch APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: esurfing_flutter

      - name: Build Split Release APKs
        run: flutter build apk --release --split-per-abi
        working-directory: esurfing_flutter

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: surfing-client-arm64
          path: esurfing_flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: surfing-client-armv7
          path: esurfing_flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
