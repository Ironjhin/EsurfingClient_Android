name: Flutter Universal APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 利用线上 Linux 虚拟环境的 Flutter 引擎强行修复并补齐所有缺失的原生构建桩文件
      - name: Auto Repair Gradle Wrapper
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      # 方案 A：移除 --split-per-abi，生成包含全架构的通用安装包，避开 ABI 冲突
      - name: Build Universal Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      # 归档通用 APK 产物
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: surfing-client-universal
          path: build/app/outputs/flutter-apk/app-release.apk
