name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c
          emulator: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get
        working-directory: ./esurfing_flutter

      - name: Configure CMake for ${{ matrix.abi }}
        run: |
          cd esurfing_flutter/android
          ./gradlew assembleDebug -PtargetAbi=${{ matrix.abi }} --no-daemon -q

      - name: Build APK for ${{ matrix.abi }}
        run: |
          cd esurfing_flutter
          flutter build apk \
            --debug \
            --target-platform android-${{ matrix.abi }} \
            --no-pub \
            --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: esurfing-client-${{ matrix.abi }}
          path: esurfing_flutter/build/app/outputs/flutter-apk/app-${{ matrix.abi }}-debug.apk
          retention-days: 7

  release:
    name: Build Release APK Bundle
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c

      - name: Download all ABI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: esurfing-client-*
          path: artifacts
          merge-multiple: true

      - name: Build Universal Release APK
        run: |
          cd esurfing_flutter
          flutter build apk \
            --release \
            --split-per-abi \
            --no-pub \
            --no-tree-shake-icons

      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: esurfing-client-release
          path: esurfing_flutter/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: esurfing_flutter/build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
