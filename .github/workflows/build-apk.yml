name: Flutter Universal APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 核心步骤：生成基础外壳后，立即强行注入全套正确配置，锁死所有变量
      - name: Auto Repair and Force Inject Configs
        run: |
          # 1. 让 Flutter 生成缺失的 gradlew 和引导层
          flutter create --platforms=android .
          
          # 2. 强行重写并锁死 gradle-wrapper.properties，确保 distributionUrl 绝对存在
          mkdir -p android/gradle/wrapper
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          EOF

          # 3. 强行重写并锁死 gradle.properties，确保彻底关闭 Jetifier 并阻止 AGP 9 报错
          cat << 'EOF' > android/gradle.properties
          org.gradle.jvmargs=-Xmx4G
          android.useAndroidX=true
          android.enableJetifier=false
          android.newDsl=false
          EOF

      - name: Install dependencies
        run: flutter pub get

      # 执行全架构通用包编译（动态版本号：github.run_number 绝对递增）
      - name: Build Universal Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      # 发布独立不重名的 Release APK
      - name: Create Unique Release and Upload Raw APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          printf '%s\n' \
            "构建 ${{ github.run_number }}（提交 ${{ github.sha }}）" \
            "" \
            "本轮修复：" \
            "- 修复 FOLLOWLOCATION 跟随重定向后目标域名 DNS 解析失败时，重定向被忽略的问题（check_network 超时/502 后永远检测不到 captive portal）" \
            "- Portal 域名（如 enet.10000.gd.cn）DNS 解析失败时，自动用 AC IP 替换域名重试" \
            "- 恢复原版 PC 客户端 User-Agent（CCTP/Linux64/1003），修复广东电信 Portal 因移动端 UA 返回手机版页面导致配置提取失败" \
            "- 主探测 URL 恢复为原版 PC 配置 connect.rom.miui.com；备用 edge-http.microsoft.com" \
            "- 修复探测 URL 返回 502 等异常时不会自动尝试备用 URL 的问题" \
            "- 启用服务开关现在能真正自动启动认证线程" \
            "- Portal 配置提取增加结尾标签缺失容错，消除 NULL 解引用闪退" \
            "- 校园网标志提取增加三层判空保护" \
            "- 恢复 libcurl FOLLOWLOCATION 原生重定向，修复相对路径崩溃" \
            "- Cookie 引擎 + 浏览器 UA 伪装修复 curl_code=56 网关重置" \
            > /tmp/release-notes.md
          gh release create "$TAG_NAME" \
            build/app/outputs/flutter-apk/app-release.apk \
            --title "Esurfing Client $TAG_NAME" \
            --notes-file /tmp/release-notes.md
