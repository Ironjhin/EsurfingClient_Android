name: Flutter Universal APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 核心步骤：生成基础外壳后，立即强行注入全套正确配置，锁死所有变量
      - name: Auto Repair and Force Inject Configs
        run: |
          # 1. 让 Flutter 生成缺失的 gradlew 和引导层
          flutter create --platforms=android .
          
          # 2. 强行重写并锁死 gradle-wrapper.properties，确保 distributionUrl 绝对存在
          mkdir -p android/gradle/wrapper
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          EOF

          # 3. 强行重写并锁死 gradle.properties，确保彻底关闭 Jetifier 并阻止 AGP 9 报错
          cat << 'EOF' > android/gradle.properties
          org.gradle.jvmargs=-Xmx4G
          android.useAndroidX=true
          android.enableJetifier=false
          android.newDsl=false
          EOF

      - name: Install dependencies
        run: flutter pub get

      # 执行全架构通用包编译（动态版本号：github.run_number 绝对递增）
      - name: Build Universal Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      # 发布独立不重名的 Release APK
      - name: Create Unique Release and Upload Raw APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          gh release create "$TAG_NAME" \
            build/app/outputs/flutter-apk/app-release.apk \
            --title "Esurfing Client $TAG_NAME" \
            --notes "构建 ${{ github.run_number }}（提交 ${{ github.sha }}）

本次修复：
- 204 状态码探测间隔恢复为 10 秒，消除高频暴刷
- 日志清空改用 C 层同源物理截断 + Dart 字节偏移读取，彻底解决日志复活和磁盘膨胀
- 重定向跟随注入 Cookie 引擎 + 标准浏览器 UA 指纹伪装，修复 curl_code=56 网关重置
- 重定向失败时状态机熔断返回，防止无效 auth 占用线程"
